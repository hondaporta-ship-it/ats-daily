<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<title>ATS 今日のひとこと</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #f4f5f7;
  --navy-deep: #0f2744;
  --navy: #1a3a5c;
  --navy-mid: #2d5278;
  --navy-soft: #5b7a9b;
  --text-primary: #1a2433;
  --text-secondary: #6b7a8c;
  --text-tertiary: #a0aab8;
  --gold-accent: #c89b3c;
  --green-status: #4ade80;
  --border-subtle: rgba(15, 39, 68, 0.08);
  --grid-line: rgba(15, 39, 68, 0.04);
  --shadow-button: rgba(15, 39, 68, 0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; min-height: 100dvh; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 1; }
.app { position: relative; z-index: 10; height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px); max-width: 480px; margin: 0 auto; }
.header { padding: 24px 4px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: flex-end; }
.brand-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.15em; color: var(--navy-deep); line-height: 1; }
.brand-sub { font-family: 'Shippori Mincho', serif; font-size: 11px; color: var(--text-secondary); letter-spacing: 0.3em; margin-top: 4px; }
.status { display: flex; align-items: center; gap: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.15em; color: var(--text-secondary); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-status); box-shadow: 0 0 8px rgba(74, 222, 128, 0.6); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.date-bar { padding: 20px 4px; display: flex; justify-content: space-between; align-items: center; }
.date-main { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--navy-deep); letter-spacing: 0.05em; line-height: 1; }
.date-sub { text-align: right; }
.date-year { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--text-secondary); letter-spacing: 0.1em; }
.date-weekday { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--text-primary); letter-spacing: 0.1em; margin-top: 4px; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; position: relative; }
.button-area { display: flex; flex-direction: column; align-items: center; gap: 24px; transition: opacity 0.6s ease, transform 0.6s ease; }
.button-area.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; position: absolute; }
.theme-label { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--gold-accent); letter-spacing: 0.4em; opacity: 0.95; }
.main-button { width: 240px; height: 240px; border-radius: 50%; border: none; background: radial-gradient(circle at 30% 30%, var(--navy-mid) 0%, var(--navy) 50%, var(--navy-deep) 100%); color: #ffffff; font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.3em; cursor: pointer; position: relative; box-shadow: 0 20px 40px var(--shadow-button), 0 6px 16px rgba(15, 39, 68, 0.15), inset 0 2px 4px rgba(255, 255, 255, 0.15), inset 0 -2px 6px rgba(0, 0, 0, 0.25); transition: transform 0.2s; }
.main-button::before { content: ''; position: absolute; inset: -8px; border: 1px solid var(--navy-soft); border-radius: 50%; opacity: 0.25; animation: ringRotate 20s linear infinite; }
.main-button::after { content: ''; position: absolute; inset: -16px; border: 1px dashed var(--navy-soft); border-radius: 50%; opacity: 0.18; animation: ringRotate 30s linear infinite reverse; }
@keyframes ringRotate { to { transform: rotate(360deg); } }
.main-button:active { transform: scale(0.95); }
.button-hint { font-family: 'Bebas Neue', sans-serif; font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.3em; margin-top: 8px; }
.content-area { width: 100%; max-width: 480px; opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease 0.3s, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
.content-area.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.theme-tag { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--gold-accent); letter-spacing: 0.4em; margin-bottom: 32px; position: relative; padding: 0 24px; }
.theme-tag::before, .theme-tag::after { content: ''; position: absolute; top: 50%; width: 12px; height: 1px; background: var(--gold-accent); opacity: 0.5; }
.theme-tag::before { left: 0; }
.theme-tag::after { right: 0; }
.content-text { font-family: 'Shippori Mincho', serif; font-size: 22px; line-height: 2.0; color: var(--navy-deep); text-align: center; white-space: pre-line; letter-spacing: 0.05em; font-weight: 500; padding: 0 16px; }
.reset-button { margin-top: 40px; background: transparent; border: 1px solid var(--navy-soft); color: var(--navy); font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.3em; padding: 12px 32px; cursor: pointer; border-radius: 2px; }
.reset-button:active { background: rgba(15, 39, 68, 0.04); transform: scale(0.97); }
.footer { text-align: center; padding: 16px 0 4px; border-top: 1px solid var(--border-subtle); }
.footer-text { font-family: 'Shippori Mincho', serif; font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.2em; opacity: 0.85; }
@media (max-height: 700px) { .main-button { width: 200px; height: 200px; font-size: 18px; } .date-main { font-size: 36px; } .content-text { font-size: 20px; } }
</style>
</head>
<body>
<div class="app">
<header class="header">
<div>
<div class="brand-logo">A・T・S</div>
<div class="brand-sub">今日のひとこと</div>
</div>
<div class="status"><span class="status-dot"></span><span>ON DUTY</span></div>
</header>
<div class="date-bar">
<div class="date-main" id="dateMain">--/--</div>
<div class="date-sub">
<div class="date-year" id="dateYear">----</div>
<div class="date-weekday" id="dateWeekday">--曜日</div>
</div>
</div>
<main class="main">
<div class="button-area" id="buttonArea">
<div class="theme-label" id="themeLabel">本日の言葉</div>
<button class="main-button" id="mainButton">ひとこと</button>
<div class="button-hint">TAP TO REVEAL</div>
</div>
<div class="content-area" id="contentArea">
<div class="theme-tag" id="themeTag"></div>
<div class="content-text" id="contentText"></div>
<button class="reset-button" id="resetButton">CLOSE</button>
</div>
</main>
<footer class="footer">
<div class="footer-text">ATセキュリティ ・ 凡事徹底</div>
</footer>
</div>
<script>
const WEEKDAY_JP = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];
let contentData = null;
let isRevealed = false;
function updateDateDisplay() {
  const now = new Date();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const year = now.getFullYear();
  const weekdayJP = WEEKDAY_JP[now.getDay()];
  document.getElementById('dateMain').textContent = `${month}/${day}`;
  document.getElementById('dateYear').textContent = year;
  document.getElementById('dateWeekday').textContent = weekdayJP;
  return { key: `${month}-${day}` };
}
async function loadContent() {
  try {
    const r = await fetch('content.json');
    contentData = await r.json();
  } catch (e) { contentData = {}; }
}
function setTodaysTheme() {
  const { key } = updateDateDisplay();
  if (contentData && contentData[key]) {
    const theme = contentData[key].theme;
    const themeName = theme.split('・')[1] || theme;
    document.getElementById('themeLabel').textContent = themeName;
  }
}
function reveal() {
  if (isRevealed) return;
  isRevealed = true;
  const { key } = updateDateDisplay();
  const data = contentData && contentData[key];
  if (!data) {
    document.getElementById('themeTag').textContent = '本日のひとこと';
    document.getElementById('contentText').textContent = '今日も、一日お疲れ様です。';
  } else {
    document.getElementById('themeTag').textContent = data.theme;
    document.getElementById('contentText').textContent = data.content;
  }
  document.getElementById('buttonArea').classList.add('hidden');
  document.getElementById('contentArea').classList.add('visible');
  if (navigator.vibrate) navigator.vibrate(20);
}
function reset() {
  isRevealed = false;
  document.getElementById('contentArea').classList.remove('visible');
  document.getElementById('buttonArea').classList.remove('hidden');
}
document.getElementById('mainButton').addEventListener('click', reveal);
document.getElementById('resetButton').addEventListener('click', reset);
(async () => {
  updateDateDisplay();
  await loadContent();
  setTodaysTheme();
})();
</script>
</body>
</html>
